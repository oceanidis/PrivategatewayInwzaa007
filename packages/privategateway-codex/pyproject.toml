[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "privategateway-codex"
version = "0.2.0"
requires-python = ">=3.11"
dependencies = [
  "mcp>=1.0,<2.0",
  "privategateway-client>=0.2,<0.3",
  "privategateway-service>=0.2,<0.3",
]

[tool.setuptools]
packages = ["privategateway_codex"]

[project.scripts]
privategateway-codex-mcp = "privategateway_codex.mcp_server:main"

privategateway-codex-setup = "privategateway_codex.setup:main"
